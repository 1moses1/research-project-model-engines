# Model Training Configuration

# Global Settings
global:
  random_seed: 42
  device: "cuda"  # Options: cuda, cpu, mps (for Mac)
  num_workers: 4
  save_dir: "outputs/models"
  checkpoint_frequency: 1  # Save every N epochs

# BERT Classifier Configuration
bert:
  model_name: "bert-base-uncased"
  num_labels: 2  # Binary: compliant vs non-compliant
  max_length: 512  # Maximum sequence length

  training:
    epochs: 5
    batch_size: 16
    learning_rate: 2.0e-5
    warmup_steps: 500
    weight_decay: 0.01
    optimizer: "adamw"
    scheduler: "linear"
    gradient_accumulation_steps: 2
    max_grad_norm: 1.0

  fine_tuning:
    freeze_layers: 10  # Freeze first 10 layers
    trainable_layers: [10, 11]  # Train last 2 encoder layers + classification head

  early_stopping:
    enabled: true
    patience: 3
    min_delta: 0.001

# XGBoost Classifier Configuration
xgboost:
  objective: "binary:logistic"
  eval_metric: "logloss"

  hyperparameters:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1  # L1 regularization
    reg_lambda: 1.0  # L2 regularization
    scale_pos_weight: 3  # For imbalanced classes

  training:
    early_stopping_rounds: 50
    verbose: true
    use_gpu: false  # XGBoost can use GPU if available

# LSTM Classifier Configuration
lstm:
  embedding:
    type: "glove"  # Options: glove, word2vec, fasttext, trainable
    dimension: 100
    pretrained_path: "embeddings/glove.6B.100d.txt"

  architecture:
    hidden_size: 128
    num_layers: 2
    bidirectional: true
    dropout: 0.3
    recurrent_dropout: 0.2

  training:
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
    optimizer: "adam"
    scheduler: "reduce_on_plateau"
    patience: 5
    min_lr: 1.0e-6

  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.001

# Hybrid Ensemble Configuration
ensemble:
  type: "stacking"  # Options: stacking, voting, boosting

  base_models:
    - bert
    - xgboost

  meta_classifier:
    type: "logistic_regression"
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"

  training:
    use_cv: true
    cv_folds: 5

# Evaluation Metrics
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
    - confusion_matrix
    - classification_report

  error_analysis:
    enabled: true
    output_path: "outputs/evaluation/error_analysis.json"

  visualization:
    plot_confusion_matrix: true
    plot_roc_curve: true
    plot_training_curves: true

# Explainability
explainability:
  shap:
    enabled: true
    num_samples: 1000  # Number of samples for SHAP analysis
    output_path: "outputs/evaluation/shap_values"

  lime:
    enabled: false  # Optional for Phase II
    num_features: 10

# Hyperparameter Tuning
hyperparameter_tuning:
  enabled: false  # Enable for optimization runs
  method: "random_search"  # Options: grid_search, random_search, bayesian

  bert:
    learning_rate: [1.0e-5, 2.0e-5, 3.0e-5, 5.0e-5]
    batch_size: [8, 16, 32]
    warmup_steps: [100, 500, 1000]

  xgboost:
    max_depth: [4, 6, 8]
    learning_rate: [0.01, 0.05, 0.1]
    n_estimators: [300, 500, 700]

  lstm:
    hidden_size: [64, 128, 256]
    dropout: [0.2, 0.3, 0.4]
    learning_rate: [0.0001, 0.001, 0.01]

# Logging
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  file: "logs/training.log"
  console: true
  tensorboard: true
  tensorboard_dir: "logs/tensorboard"
  wandb:
    enabled: false  # Optional for experiment tracking
    project: "rwanda-compliance-ml"
    entity: "cmu-research"

# Checkpointing
checkpointing:
  save_best_only: true
  monitor: "val_f1_score"
  mode: "max"
  verbose: true
