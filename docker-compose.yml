# Rwanda NCSA Compliance Auditor - Master Orchestration
# All 7 engines with PostgreSQL + Redis for persistence and real-time state
#
# ENGINE ORDERING (ALIGNED ARCHITECTURE):
#   ENGINE 1: Log Collector (8001) - collects and normalizes logs
#   ENGINE 2: Document Processor (8002) - extracts controls from policy documents
#   ENGINE 3: XGBoost Classifier (8003) - ML-based compliance classification
#   ENGINE 4: Decision Engine (8004) - risk scoring and routing decisions
#   ENGINE 5: Report Generator (8005) - LLM-powered PDF report generation
#   ENGINE 6: Web UI (8006) - dashboard with WebSocket for real-time updates
#   ENGINE 7: Auth Engine (8007) - authentication & machine connection
#
# DATABASES:
#   PostgreSQL (5432) - Persistent storage for audits, reports, organizations
#   Redis (6379) - Session management, real-time updates, caching

services:
  # ==========================================================================
  # POSTGRESQL - Persistent Storage
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: rwanda-ncsa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rwanda_ncsa
      POSTGRES_USER: rwanda_admin
      POSTGRES_PASSWORD: rwanda_secure_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rwanda_admin -d rwanda_ncsa"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # REDIS - Session Management & Real-time Updates
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: rwanda-ncsa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 7: Authentication & Authorization Engine
  # ==========================================================================
  auth-engine:
    build:
      context: ./engines/engine7-auth-engine
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine7
    ports:
      - "8007:8007"
    environment:
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - AUTH_ALGORITHM=HS256
      - AUTH_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - HOST=0.0.0.0
      - PORT=8007
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENGINE_NAME=engine7-auth
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 1: Log Collector
  # ==========================================================================
  log-collector:
    build:
      context: ./engines
      dockerfile: engine1-log-collector/Dockerfile
    container_name: rwanda-ncsa-engine1
    ports:
      - "8001:8001"
    environment:
      - ENGINE3_URL=http://xgboost-classifier:8003
      - ENGINE4_URL=http://decision-engine:8004
      - ENGINE7_URL=http://auth-engine:8007
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONTROL_TAXONOMY_PATH=/app/data/control_taxonomy_validated.json
      - HOST=0.0.0.0
      - PORT=8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENGINE_NAME=engine1-log-collector
    depends_on:
      redis:
        condition: service_healthy
      auth-engine:
        condition: service_started
      xgboost-classifier:
        condition: service_started
      decision-engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 2: Document Processor
  # ==========================================================================
  document-processor:
    build:
      context: ./engines
      dockerfile: engine2-document-processor/Dockerfile
    container_name: rwanda-ncsa-engine2
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONTROL_TAXONOMY_PATH=/app/data/control_taxonomy_validated.json
      - HOST=0.0.0.0
      - PORT=8002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENGINE_NAME=engine2-document-processor
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 3: XGBoost Compliance Classifier
  # ==========================================================================
  xgboost-classifier:
    build:
      context: ./engines
      dockerfile: engine3-xgboost-classifier/Dockerfile
    container_name: rwanda-ncsa-engine3
    ports:
      - "8003:8003"
    environment:
      - HOST=0.0.0.0
      - PORT=8003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENGINE_NAME=engine3-xgboost-classifier
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 4: Decision Engine
  # ==========================================================================
  decision-engine:
    build:
      context: ./engines
      dockerfile: engine4-decision-engine/Dockerfile
    container_name: rwanda-ncsa-engine4
    ports:
      - "8004:8004"
    environment:
      - HOST=0.0.0.0
      - PORT=8004
      - ENGINE3_URL=http://xgboost-classifier:8003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_URL=postgresql://rwanda_admin:rwanda_secure_2024@postgres:5432/rwanda_ncsa
      - ENGINE_NAME=engine4-decision-engine
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      xgboost-classifier:
        condition: service_started
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 5: Report Generator (PDF reports)
  # ==========================================================================
  report-generator:
    build:
      context: ./engines
      dockerfile: engine3-xgboost-classifier/Dockerfile
    container_name: rwanda-ncsa-engine5
    ports:
      - "8005:8005"
    environment:
      - HOST=0.0.0.0
      - PORT=8005
      - ENGINE4_URL=http://decision-engine:8004
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENGINE_NAME=engine5-report-generator
    volumes:
      - reports_data:/app/reports
    depends_on:
      redis:
        condition: service_healthy
      decision-engine:
        condition: service_started
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ==========================================================================
  # ENGINE 6: Web UI (Dashboard with WebSocket)
  # ==========================================================================
  web-ui:
    build:
      context: ./engines/engine6-web-ui
      dockerfile: engine4-decision-engine/Dockerfile
    container_name: rwanda-ncsa-engine6
    ports:
      - "8006:8006"
    environment:
      - HOST=0.0.0.0
      - PORT=8006
      - ENGINE1_URL=http://log-collector:8001
      - ENGINE2_URL=http://document-processor:8002
      - ENGINE3_URL=http://xgboost-classifier:8003
      - ENGINE4_URL=http://decision-engine:8004
      - ENGINE5_URL=http://report-generator:8005
      - ENGINE7_URL=http://auth-engine:8007
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=rwanda_ncsa
      - PG_USER=rwanda_admin
      - PG_PASSWORD=rwanda_secure_2024
      - ENGINE_NAME=engine6-web-ui
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-engine:
        condition: service_started
      log-collector:
        condition: service_started
      document-processor:
        condition: service_started
      xgboost-classifier:
        condition: service_started
      decision-engine:
        condition: service_started
      report-generator:
        condition: service_started
    restart: unless-stopped
    networks:
      - rwanda-ncsa

# ==========================================================================
# VOLUMES
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  reports_data:
    driver: local
  uploads_data:
    driver: local

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
  rwanda-ncsa:
    driver: bridge
    name: rwanda-ncsa-compliance
