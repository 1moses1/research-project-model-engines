# Rwanda NCSA Compliance Auditor - Master Orchestration
# All 6 engines with self-contained dependencies

services:
  # ENGINE 3: XGBoost Compliance Classifier
  xgboost-classifier:
    build:
      context: ./engines_new/engine3-xgboost-classifier
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine3
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ENGINE 2: Document Processor
  document-processor:
    build:
      context: ./engines_new/engine2-document-processor
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine2
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONTROL_TAXONOMY_PATH=/app/data/control_taxonomy_validated.json
      - HOST=0.0.0.0
      - PORT=8002
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ENGINE 1: Log Collector
  log-collector:
    build:
      context: ./engines_new/engine1-log-collector
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine1
    ports:
      - "8001:8001"
    environment:
      - ENGINE3_URL=http://xgboost-classifier:8000
      - ENGINE4_URL=http://decision-engine:8004
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONTROL_TAXONOMY_PATH=/app/data/control_taxonomy_validated.json
      - HOST=0.0.0.0
      - PORT=8001
    depends_on:
      - xgboost-classifier
      - decision-engine
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ENGINE 4: Decision Engine
  decision-engine:
    build:
      context: ./engines_new/engine4-decision-engine
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine4
    ports:
      - "8004:8004"
    environment:
      - HOST=0.0.0.0
      - PORT=8004
      - ENGINE3_URL=http://xgboost-classifier:8000
    depends_on:
      - xgboost-classifier
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ENGINE 5: Web UI
  web-ui:
    build:
      context: ./engines_new/engine5-web-ui
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine5
    ports:
      - "3000:3000"
      - "8005:8005"
    environment:
      - ENGINE1_URL=http://log-collector:8001
      - ENGINE2_URL=http://document-processor:8002
      - ENGINE3_URL=http://xgboost-classifier:8000
      - ENGINE4_URL=http://decision-engine:8004
      - ENGINE6_URL=http://report-generator:8006
    depends_on:
      - log-collector
      - document-processor
      - xgboost-classifier
      - decision-engine
      - report-generator
    restart: unless-stopped
    networks:
      - rwanda-ncsa

  # ENGINE 6: Report Generator
  report-generator:
    build:
      context: ./engines_new/engine6-report-generator
      dockerfile: Dockerfile
    container_name: rwanda-ncsa-engine6
    ports:
      - "8006:8006"
    environment:
      - HOST=0.0.0.0
      - PORT=8006
      - ENGINE4_URL=http://decision-engine:8004
    depends_on:
      - decision-engine
    restart: unless-stopped
    networks:
      - rwanda-ncsa

networks:
  rwanda-ncsa:
    driver: bridge
    name: rwanda-ncsa-compliance
