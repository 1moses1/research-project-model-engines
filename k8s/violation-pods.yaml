---
# Simulation Pod 1: Unauthorized SSH Access (AC-3 Violation)
apiVersion: v1
kind: Pod
metadata:
  name: violation-unauthorized-ssh
  namespace: compliance-monitoring
  labels:
    violation-type: unauthorized-access
    control: AC-3
spec:
  containers:
  - name: ssh-simulator
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Starting unauthorized SSH simulation..."
        while true; do
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] FAILED SSH login attempt from 192.168.1.100 for user admin - Access denied"
          sleep 30
        done
  restartPolicy: Always

