# Kind cluster configuration for Rwanda NCSA Compliance Model
# Single-node cluster for local testing
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: compliance-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Expose compliance API
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Expose metrics
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
