---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: compliance-monitor
  namespace: compliance-monitoring
  labels:
    app: compliance-monitor
    version: v2.5
spec:
  selector:
    matchLabels:
      app: compliance-monitor
  template:
    metadata:
      labels:
        app: compliance-monitor
        version: v2.5
    spec:
      containers:
      - name: compliance-api
        image: rwanda-compliance:v2.5
        imagePullPolicy: Never  # Use local image from Kind
        ports:
        - name: api
          containerPort: 5000
          protocol: TCP
        env:
        - name: PORT
          value: "5000"
        - name: PYTHONUNBUFFERED
          value: "1"
        envFrom:
        - configMapRef:
            name: compliance-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
